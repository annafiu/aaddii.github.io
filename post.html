<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loading...</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
    --bg-color: #faf9f6;
    --text-main: #111111;
    --text-muted: #6e6e6e;
    --border-color: #e8e6e0;
}

body{
    background:var(--bg-color);
    color:var(--text-main);
    margin:0;
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
}

.article-container{
    max-width:760px;
    margin:80px auto;
    padding:0 32px;
}

.back{
    display:inline-block;
    margin-bottom:48px;
    font-family:'Courier Prime',monospace;
    color:var(--text-muted);
    text-decoration:none;
}

.back:hover{
    color:var(--text-main);
}

h1{
    font-family:"DM Serif Display",serif;
    font-size:3.5rem;
    line-height:1.1;
    font-weight:400;
    letter-spacing:-0.02em;
    margin-bottom:3rem;
    padding-bottom:2rem;
    border-bottom:1px solid var(--border-color);
}

#content{
    font-family:"DM Serif Display",serif;
    font-size:1.15rem;
    line-height:1.9;
    color:#222;
}

#content p{
    margin-bottom:2rem;
}

#content h2{
    font-family:'Inter',sans-serif;
    font-size:1.4rem;
    margin-top:3rem;
    margin-bottom:1rem;
}

#content h3{
    font-family:'Inter',sans-serif;
    font-size:1.15rem;
    margin-top:2rem;
    margin-bottom:1rem;
}

#content img{
    width:100%;
    height:auto;
    display:block;
    margin:3rem auto;
}

#content blockquote{
    border-left:2px solid var(--border-color);
    padding-left:1.5rem;
    margin:2rem 0;
    color:var(--text-muted);
    font-style:italic;
}

#content ul,
#content ol{
    margin-bottom:2rem;
    padding-left:2rem;
}

#content a{
    color:var(--text-main);
}

.article-footer{
    margin-top:5rem;
    padding-top:2rem;
    border-top:1px solid var(--border-color);
    color:var(--text-muted);
    font-size:.85rem;
}

</style>
</head>
    <body>

<div class="article-container">

<a class="back" href="https://www.annafiu.com/aaddii.github.io">
← Kembali ke Indeks
</a>

<h1 id="title">Loading...</h1>

<div id="content"></div>
<script>

function getSlug(){
    const url=new URLSearchParams(window.location.search);
    return url.get('slug');
}

function renderPost(data){

    const slug=getSlug();

    const entries=data.feed.entry;

    for(const post of entries){

        const alt=post.link.find(
            l => l.rel === 'alternate'
        );

        const postSlug=
            alt.href
            .split('/')
            .pop()
            .replace('.html','');

        if(postSlug===slug){

            document.title=post.title.$t;

            document.getElementById('title')
                .innerHTML=post.title.$t;

            let html = post.content.$t;

// hapus judul H1 dari Blogger jika ada
html = html.replace(
    /<h1[^>]*>.*?<\/h1>/is,
    ''
);

document.getElementById('content').innerHTML = html;

            return;
        }
    }

    document.getElementById('title')
        .innerHTML='Artikel tidak ditemukan';
}

</script>

<script src="https://aaddiiweb.blogspot.com/feeds/posts/default?alt=json-in-script&max-results=100&callback=renderPost"></script>

<div class="article-footer">
    aaddii.com — Jurnal & Catatan Ruang
</div>

</div>

</body>
</html>
