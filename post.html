<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/main.css">
</head>
    
<body>

<div class="article-container">

<a class="back" href="https://www.annafiu.com/aaddii.github.io/">
← Kembali ke Indeks
</a>

<article>

<header class="essay-header">

<div class="journal-meta">
    <span id="article-date">Loading...</span>
    <span>Oleh Farrij Tri Annafi'u</span>
</div>

<h1 id="title" class="essay-title">
Loading...
</h1>

<p id="excerpt" class="essay-excerpt"></p>

</header>

<div id="content"></div>

</article>

<div class="article-footer">
    aaddii.com — Jurnal & Catatan Ruang
</div>

</div>

<script>

function getSlug(){
    const url = new URLSearchParams(window.location.search);
    return url.get('slug');
}

function stripHtml(html){
    const div=document.createElement('div');
    div.innerHTML=html;
    return div.textContent || div.innerText || '';
}

function renderPost(data){

    const slug=getSlug();

    if(!data.feed || !data.feed.entry) return;

    const entries=data.feed.entry;

    for(const post of entries){

        const alt=post.link.find(
            l => l.rel === 'alternate'
        );

        if(!alt) continue;

        const postSlug=
            alt.href
            .split('/')
            .pop()
            .replace('.html','');

        if(postSlug===slug){

            const title=post.title.$t;
            let content=post.content ? post.content.$t : '';

            const plainText=stripHtml(content);

            const excerpt=
                plainText.substring(0,220) + '...';

            const dateObj=
                new Date(post.published.$t);

            const dateText=
                dateObj.toLocaleDateString(
                    'id-ID',
                    {
                        day:'numeric',
                        month:'long',
                        year:'numeric'
                    }
                );

            document.title=title;

            document.getElementById('title')
                .innerHTML=title;

            document.getElementById('article-date')
                .innerHTML=dateText;

            document.getElementById('excerpt')
                .innerText=excerpt;

            content = content.replace(
                /<h1[^>]*>.*?<\/h1>/gis,
                ''
            );

            document.getElementById('content')
                .innerHTML=content;

            return;
        }
    }

    document.getElementById('title')
        .innerHTML='Artikel tidak ditemukan';

}

</script>

<script src="https://aaddiiweb.blogspot.com/feeds/posts/default?alt=json-in-script&max-results=100&callback=renderPost"></script>

</body>
</html>
