<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
    --bg-color:#faf9f6;
    --text-main:#111111;
    --text-muted:#6e6e6e;
    --border-color:#e8e6e0;

    --font-serif:'DM Serif Display',serif;
    --font-sans:'Inter',sans-serif;
    --font-mono:'Courier Prime',monospace;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg-color);
    color:var(--text-main);
    font-family:var(--font-sans);
    -webkit-font-smoothing:antialiased;
}

.article-container{
    max-width:760px;
    margin:80px auto;
    padding:0 32px;
}

.back{
    display:inline-block;
    margin-bottom:48px;
    font-family:var(--font-mono);
    color:var(--text-muted);
    text-decoration:none;
    font-size:.85rem;
}

.back:hover{
    color:var(--text-main);
}

.essay-header{
    margin-bottom:3rem;
    border-bottom:1px solid var(--border-color);
    padding-bottom:2rem;
}

.journal-meta{
    display:flex;
    flex-direction:column;
    gap:.35rem;
    font-family:var(--font-mono);
    font-size:.8rem;
    color:var(--text-muted);
}

.essay-title{
    font-family:var(--font-serif);
    font-size:3.25rem;
    line-height:1.1;
    font-weight:400;
    letter-spacing:-0.02em;
    margin-top:1rem;
    margin-bottom:1.5rem;
}

.essay-excerpt{
    font-style:italic;
    color:var(--text-muted);
    font-size:1.1rem;
    line-height:1.8;
}

#content{
    font-family:var(--font-serif);
    font-size:1.15rem;
    line-height:1.9;
    color:#222;
}

#content p{
    margin-bottom:2rem;
}

#content h2{
    font-family:var(--font-sans);
    font-size:1.5rem;
    margin-top:3rem;
    margin-bottom:1rem;
}

#content h3{
    font-family:var(--font-sans);
    font-size:1.2rem;
    margin-top:2rem;
    margin-bottom:1rem;
}

#content img{
    width:100%;
    height:auto;
    display:block;
    margin:3rem auto;
}

#content blockquote{
    border-left:2px solid var(--border-color);
    padding-left:1.5rem;
    margin:2rem 0;
    color:var(--text-muted);
    font-style:italic;
}

#content ul,
#content ol{
    margin-bottom:2rem;
    padding-left:2rem;
}

#content a{
    color:var(--text-main);
}

.article-footer{
    margin-top:5rem;
    padding-top:2rem;
    border-top:1px solid var(--border-color);
    color:var(--text-muted);
    font-family:var(--font-mono);
    font-size:.8rem;
}

@media(max-width:768px){

    .article-container{
        padding:0 24px;
    }

    .essay-title{
        font-size:2.4rem;
    }

    #content{
        font-size:1.05rem;
    }

}

</style>
</head>

<body>

<div class="article-container">

<a class="back" href="https://www.annafiu.com/aaddii.github.io/">
← Kembali ke Indeks
</a>

<article>

<header class="essay-header">

<div class="journal-meta">
    <span id="article-date">Loading...</span>
    <span>Oleh Farrij Tri Annafi'u</span>
</div>

<h1 id="title" class="essay-title">
Loading...
</h1>

<p id="excerpt" class="essay-excerpt"></p>

</header>

<div id="content"></div>

</article>

<div class="article-footer">
    aaddii.com — Jurnal & Catatan Ruang
</div>

</div>

<script>

function getSlug(){
    const url = new URLSearchParams(window.location.search);
    return url.get('slug');
}

function stripHtml(html){
    const div=document.createElement('div');
    div.innerHTML=html;
    return div.textContent || div.innerText || '';
}

function renderPost(data){

    const slug=getSlug();

    if(!data.feed || !data.feed.entry) return;

    const entries=data.feed.entry;

    for(const post of entries){

        const alt=post.link.find(
            l => l.rel === 'alternate'
        );

        if(!alt) continue;

        const postSlug=
            alt.href
            .split('/')
            .pop()
            .replace('.html','');

        if(postSlug===slug){

            const title=post.title.$t;
            let content=post.content ? post.content.$t : '';

            const plainText=stripHtml(content);

            const excerpt=
                plainText.substring(0,220) + '...';

            const dateObj=
                new Date(post.published.$t);

            const dateText=
                dateObj.toLocaleDateString(
                    'id-ID',
                    {
                        day:'numeric',
                        month:'long',
                        year:'numeric'
                    }
                );

            document.title=title;

            document.getElementById('title')
                .innerHTML=title;

            document.getElementById('article-date')
                .innerHTML=dateText;

            document.getElementById('excerpt')
                .innerText=excerpt;

            content = content.replace(
                /<h1[^>]*>.*?<\/h1>/gis,
                ''
            );

            document.getElementById('content')
                .innerHTML=content;

            return;
        }
    }

    document.getElementById('title')
        .innerHTML='Artikel tidak ditemukan';

}

</script>

<script src="https://aaddiiweb.blogspot.com/feeds/posts/default?alt=json-in-script&max-results=100&callback=renderPost"></script>

</body>
</html>
