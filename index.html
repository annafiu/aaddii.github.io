<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aaddii.com — Journal & Spatial Notes</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <h1 class="logo"><a href="index.html">aaddii.com</a></h1>
            <nav class="site-nav">
                <button id="nav-index" class="active" onclick="showSection('index-view')">Index</button>
                <button id="nav-about" onclick="window.location.href='about.html'">About</button>
            </nav>
        </div>
    </header>

    <div class="container-main">

        <section id="index-view" class="view-section active-view">
            <header class="index-intro">
                <p class="manifesto">A collection of essays, speculative notes, and critical readings on architecture, space, and landscape.</p>
            </header>

            <div class="journal-list" id="main-journal-list">
                <div id="loading-posts"
                     style="
                        padding:3rem 0;
                        color:#6e6e6e;
                        font-family:'Courier Prime',monospace;
                        font-size:.85rem;">
                    Loading articles...
                </div>
            </div>
            
            <div class="homepage-pagination" id="numeric-pagination"></div>
        </section>

    </div>

    <footer class="site-footer">
        <div class="footer-container">
            <p>&copy; 2026 aaddii.com.</p>
            <p>Open Journal Index.</p>
        </div>
    </footer>
    
    <script src="./assets/js/main.js"></script>
</body>
</html>
